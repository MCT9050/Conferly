name: Playwright End-to-End Diagnostics

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Build Next.js Application
      run: npm run build
      continue-on-error: true

    - name: Start Development Server
      run: npm run dev &
      timeout-minutes: 2

    - name: Wait for Server to Start
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done' || true

    - name: Run Playwright Diagnostic Tests
      run: npx playwright test tests/conferly-auth.spec.ts --reporter=html
      continue-on-error: true

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 7

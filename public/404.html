<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferly</title>
  <script>
    // SPA redirect: handle hash-based routing
    // Extract the path from the URL and redirect to hash route
    var path = window.location.pathname;
    var hash = window.location.hash;
    
    // If already has hash, use it directly
    if (hash && hash.startsWith('#/')) {
      window.location.replace('/' + hash);
    } else if (path !== '/') {
      // Redirect non-root paths to hash route
      window.location.replace('/#' + path);
    } else {
      // Load the React app
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <noscript><p>Please enable JavaScript.</p></noscript>
  <p>Loading Conferly...</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferly - Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
    }
    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #6b7280;
      background: none;
      border: none;
      transition: all 0.2s;
    }
    .tab.active {
      color: #667eea;
      border-bottom: 2px solid #667eea;
    }
    .tab:hover:not(.active) {
      background: #f9fafb;
    }
    .form-container {
      padding: 32px;
    }
    .form {
      display: none;
    }
    .form.active {
      display: block;
    }
    h2 {
      margin-bottom: 24px;
      color: #1f2937;
      font-size: 24px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button.submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button.submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button.submit:active {
      transform: translateY(0);
    }
    button.submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .success {
      background: #f0fdf4;
      color: #16a34a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .success.show {
      display: block;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      display: none;
    }
    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>
      
      <div class="form-container">
        <!-- Error/Success Messages -->
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        <div id="loading" class="loading">Processing...</div>
        
        <!-- Login Form -->
        <form id="login-form" class="form active">
          <h2>Welcome Back</h2>
          <div class="input-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required placeholder="you@example.com">
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="submit" id="login-btn">Sign In</button>
        </form>
        
        <!-- Signup Form -->
        <form id="signup-form" class="form">
          <h2>Create Account</h2>
          <div class="input-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" name="name" required placeholder="John Doe">
          </div>
          <div class="input-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" required placeholder="you@example.com">
          </div>
          <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" required minlength="8" placeholder="Min 8 characters">
          </div>
          <button type="submit" class="submit" id="signup-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // API configuration - configure this to match your backend
    const API_BASE = window.location.origin + '/api';
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        
        // Update tab states
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Update form visibility
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        document.getElementById(`${targetTab}-form`).classList.add('active');
        
        // Clear messages
        hideMessages();
      });
    });
    
    function showError(message) {
      const el = document.getElementById('error');
      el.textContent = message;
      el.classList.add('show');
      document.getElementById('success').classList.remove('show');
    }
    
    function showSuccess(message) {
      const el = document.getElementById('success');
      el.textContent = message;
      el.classList.add('show');
      document.getElementById('error').classList.remove('show');
    }
    
    function hideMessages() {
      document.getElementById('error').classList.remove('show');
      document.getElementById('success').classList.remove('show');
    }
    
    function setLoading(loading) {
      const el = document.getElementById('loading');
      if (loading) {
        el.classList.add('show');
        document.querySelectorAll('.submit').forEach(b => b.disabled = true);
      } else {
        el.classList.remove('show');
        document.querySelectorAll('.submit').forEach(b => b.disabled = false);
      }
    }
    
    // Login form handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      setLoading(true);
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }
        
        // Store token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        showSuccess('Login successful! Redirecting...');
        
        // Redirect to main app
        setTimeout(() => {
          window.location.href = '/app.html';
        }, 1000);
        
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    });
    
    // Signup form handler
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      
      setLoading(true);
      
      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Registration failed');
        }
        
        // Store token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        showSuccess('Account created! Redirecting...');
        
        // Redirect to main app
        setTimeout(() => {
          window.location.href = '/app.html';
        }, 1000);
        
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
